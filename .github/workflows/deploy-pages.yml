# Publishes this static site to GitHub Pages.
# Repo → Settings → Pages → Build and deployment: Source = "GitHub Actions".

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (no .git or dev folders)
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/documents _site/images
          cp *.html styles.css script.js _site/
          if [ -d images ]; then cp -R images/. _site/images/; fi
          if [ -d documents ]; then cp -R documents/. _site/documents/; fi
          if [ -d assets ]; then cp -R assets _site/; fi
          for f in *.pdf; do
            if [ -f "$f" ]; then cp "$f" _site/; fi
          done
          if [ -f CNAME ]; then cp CNAME _site/; fi

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
